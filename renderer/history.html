<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>指令历史</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; overflow: hidden; }
    .history-page { max-width: 800px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
    .history-page h1 { color: #ffd700; border-bottom: 2px solid #333; padding-bottom: 10px; flex-shrink: 0; }
    #history-list { flex: 1; overflow-y: auto; padding-right: 8px; }
    .history-item { background: #16213e; border-left: 3px solid #ffd700; margin: 10px 0; padding: 12px 16px; border-radius: 4px; }
    .history-item.completed { border-left-color: #4caf50; }
    .history-item.failed { border-left-color: #f44336; }
    .history-item .time { color: #888; font-size: 0.85em; }
    .history-item .result { font-weight: bold; }
    .history-item.completed .result { color: #4caf50; }
    .history-item.failed .result { color: #f44336; }
    .history-item .phase { color: #888; font-size: 0.85em; margin-left: 10px; }
    .empty { text-align: center; padding: 40px; color: #666; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="history-page">
    <h1>指令历史</h1>
    <div id="history-list">
      <p class="empty">正在加载...</p>
    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
